{% extends "base.html" %}
{% block title %}{{ 'Edit' if user else 'Add' }} User – LibraCore{% endblock %}
{% block page_title %}{{ 'Edit' if user else 'Register' }} User{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="/users" class="btn btn-ghost btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
    <h2 style="font-family:'Cinzel',serif;font-size:20px;font-weight:700">{{ 'Edit Member' if user else 'Register New Member' }}</h2>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="post">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-control" name="name" required value="{{ user.name if user else '' }}" placeholder="John Smith">
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input class="form-control" name="email" type="email" required value="{{ user.email if user else '' }}" placeholder="john@university.edu">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" value="{{ user.phone if user else '' }}" placeholder="+91 98765 43210">
          </div>
          <div class="form-group">
            <label class="form-label">Member Type</label>
            <select class="form-control" name="member_type">
              {% for t in ['Student','Faculty','Staff','External'] %}
              <option value="{{ t }}" {% if user and user.member_type == t %}selected{% endif %}>{{ t }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> {{ 'Save Changes' if user else 'Register Member' }}</button>
          <a href="/users" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
